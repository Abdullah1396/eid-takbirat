<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>تكبيرات العيد</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cairo',sans-serif;
background:
linear-gradient(to bottom,#0f172a,#111827,#0f172a);
min-height:100vh;
overflow-x:hidden;
color:#fff7ed;
}

.container{
width:100%;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
}

.player-box{
width:100%;
max-width:600px;
background:rgba(17,24,39,.75);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.08);
border-radius:30px;
padding:35px 25px;
box-shadow:0 20px 50px rgba(0,0,0,.45);
}

.logo{
width:90px;
height:90px;
margin:auto;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
background:linear-gradient(135deg,#f59e0b,#d97706);
box-shadow:0 15px 40px rgba(245,158,11,.25);
margin-bottom:25px;
}

.title{
text-align:center;
margin-bottom:30px;
}

.title h1{
font-size:34px;
font-weight:800;
margin-bottom:8px;
color:#fef3c7;
}

.title p{
color:#fde68a;
opacity:.8;
font-size:15px;
}

.play-wrapper{
display:flex;
justify-content:center;
margin-bottom:35px;
}

.play-btn{
width:140px;
height:140px;
border:none;
border-radius:50%;
font-size:55px;
cursor:pointer;
background:linear-gradient(135deg,#fbbf24,#d97706);
color:#111827;
transition:.25s;
box-shadow:0 20px 50px rgba(245,158,11,.35);
}

.play-btn:active{
transform:scale(.95);
}

.progress-container{
margin-bottom:25px;
}

.progress-bar{
width:100%;
height:8px;
background:#374151;
border-radius:50px;
overflow:hidden;
cursor:pointer;
}

.progress{
width:0%;
height:100%;
background:linear-gradient(to right,#f59e0b,#fbbf24);
}

.time{
margin-top:10px;
display:flex;
justify-content:space-between;
font-size:14px;
color:#fde68a;
opacity:.8;
}

.volume-box{
display:flex;
align-items:center;
gap:15px;
margin-bottom:30px;
}

.volume-slider{
flex:1;
height:6px;
background:#374151;
border-radius:50px;
overflow:hidden;
cursor:pointer;
}

.volume-level{
width:100%;
height:100%;
background:linear-gradient(to right,#f59e0b,#fbbf24);
}

.info{
margin-top:10px;
padding:20px;
background:rgba(255,255,255,.03);
border-radius:20px;
line-height:1.9;
font-size:15px;
color:#fde68a;
}

.footer{
margin-top:30px;
text-align:center;
font-size:13px;
opacity:.6;
color:#fde68a;
}

@media(max-width:600px){

.title h1{
font-size:28px;
}

.play-btn{
width:120px;
height:120px;
font-size:45px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="player-box">

<div class="logo">🌙</div>

<div class="title">
<h1>تكبيرات العيد</h1>
<p>تكبيرات إسلامية متكررة كصدقة جارية</p>
</div>

<div class="play-wrapper">
<button class="play-btn" id="playBtn">▶</button>
</div>

<div class="progress-container">

<div class="progress-bar" id="progressBar">
<div class="progress" id="progress"></div>
</div>

<div class="time">
<span id="currentTime">0:00</span>
<span id="duration">0:00</span>
</div>

</div>

<div class="volume-box">

<span style="font-size:24px;">🔊</span>

<div class="volume-slider" id="volumeSlider">
<div class="volume-level" id="volumeLevel"></div>
</div>

<span id="volumeText">100%</span>

</div>

<div class="info">
قال رسول الله ﷺ:
<br><br>
"إذا مات ابن آدم انقطع عمله إلا من ثلاث:
صدقة جارية، أو علم يُنتفع به، أو ولد صالح يدعو له."
<br><br>
جعل الله استماعكم لهذه التكبيرات في ميزان حسناتكم.
</div>

<div class="footer">
© 2026 تكبيرات العيد
</div>

</div>

</div>

<!-- مهم جدا -->
<audio id="audio" loop>
<source src="takbirat.mp3" type="audio/mpeg">
</audio>

<script>

const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");

const progress = document.getElementById("progress");
const progressBar = document.getElementById("progressBar");

const currentTimeEl = document.getElementById("currentTime");
const durationEl = document.getElementById("duration");

const volumeSlider = document.getElementById("volumeSlider");
const volumeLevel = document.getElementById("volumeLevel");
const volumeText = document.getElementById("volumeText");

let isPlaying = false;

playBtn.addEventListener("click", () => {

if(isPlaying){

audio.pause();
playBtn.innerHTML = "▶";

}else{

audio.play();
playBtn.innerHTML = "⏸";

}

isPlaying = !isPlaying;

});

audio.addEventListener("timeupdate", () => {

const progressPercent =
(audio.currentTime / audio.duration) * 100;

progress.style.width = progressPercent + "%";

currentTimeEl.textContent =
formatTime(audio.currentTime);

durationEl.textContent =
formatTime(audio.duration);

});

progressBar.addEventListener("click", (e) => {

const width = progressBar.clientWidth;
const clickX = e.offsetX;

audio.currentTime =
(clickX / width) * audio.duration;

});

function formatTime(time){

const minutes = Math.floor(time / 60);
const seconds = Math.floor(time % 60);

return `${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;

}

volumeSlider.addEventListener("click",(e)=>{

const width = volumeSlider.clientWidth;
const clickX = e.offsetX;

const volume = clickX / width;

audio.volume = volume;

volumeLevel.style.width = `${volume*100}%`;

volumeText.textContent =
`${Math.floor(volume*100)}%`;

});

audio.volume = 1;

</script>

</body>
</html>
